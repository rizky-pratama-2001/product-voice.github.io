---
layout: default
---

<section class="hero">
  <h2>Welcome, I'm Rizky Pratama</h2>
  <p>Sharing product insights, tech reviews, and market analysis</p>
</section>

<section class="posts">
  {% for post in site.posts %}
    <div class="card">
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      <p class="date">{{ post.date | date: "%B %d, %Y" }}</p>
      <p>{{ post.excerpt }}</p>
    </div>
  {% endfor %}
</section>
